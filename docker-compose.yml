version: "3.8"

services:
  ebay-scrapper:
    image: flavio11113/ebay-scrapper:latest
    container_name: ebay-scrapper
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - DB_PATH=/data/ebay_deals.db
      # Set your Gemini API key here (or use a .env file / Docker secret).
      # Never commit the actual key value — leave blank to disable AI assessment.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # eBay Official API credentials (optional).
      # Obtain from https://developer.ebay.com/
      # Leave blank to use legacy HTML scraping instead.
      - EBAY_CLIENT_ID=${EBAY_CLIENT_ID:-}
      - EBAY_CLIENT_SECRET=${EBAY_CLIENT_SECRET:-}
      - EBAY_MARKETPLACE_ID=${EBAY_MARKETPLACE_ID:-EBAY_DE}
      - EBAY_ENVIRONMENT=${EBAY_ENVIRONMENT:-production}
      # DATA_SOURCE: "auto" (default), "api", or "scraper"
      - DATA_SOURCE=${DATA_SOURCE:-auto}
    volumes:
      - ebay_db:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ebay_db:
    driver: local

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBay Deal Finder</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Hero / Search bar -->
    <header class="hero">
        <h1>🛍️ eBay Deal Finder</h1>
        <p>Search eBay listings and get instant deal scores powered by AI assessment</p>
        <div class="search-container">
            <form id="searchForm">
                <input
                    type="text"
                    id="searchQuery"
                    placeholder="Search for deals… e.g. iPhone 14, RTX 4080"
                    autocomplete="off"
                    required
                />
                <button type="submit" id="searchBtn" class="btn-search">
                    <span class="spinner-border d-none" role="status" aria-hidden="true"></span>
                    <span class="btn-text">Search</span>
                </button>
            </form>
        </div>

        <!-- Settings panel -->
        <div class="settings-panel">
            <div class="settings-row">
                <label for="geminiModelInput" class="settings-label">🤖 Gemini Model</label>
                <input
                    type="text"
                    id="geminiModelInput"
                    class="settings-input"
                    placeholder="e.g. gemini-2.0-flash-lite"
                    autocomplete="off"
                    spellcheck="false"
                />
                <button id="saveModelBtn" class="btn-save-model">Save</button>
                <button id="aiToggleBtn" class="btn-ai-toggle" aria-pressed="true" title="Toggle AI evaluation on or off">
                    <span class="ai-toggle-icon">✨</span>
                    <span class="ai-toggle-label">AI: ON</span>
                </button>
            </div>
            <div class="settings-row">
                <label for="dataSourceSelect" class="settings-label">🔌 Data Source</label>
                <select id="dataSourceSelect" class="settings-select" title="Choose between the official eBay API and legacy HTML scraping">
                    <option value="auto">Auto (API if configured, else Scraper)</option>
                    <option value="api">eBay Official API</option>
                    <option value="scraper">Legacy Scraper</option>
                </select>
                <span id="dataSourceStatus" class="data-source-status"></span>
            </div>
            <div id="modelStatus" class="model-status"></div>
        </div>
    </header>

    <main class="main">

        <!-- Error -->
        <div id="errorContainer" class="alert alert-danger d-none"></div>

        <!-- Loading -->
        <div id="loadingContainer" class="loading-container d-none">
            <div class="progress-section">
                <div class="progress-label" id="progressLabel">⏳ Searching eBay…</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <div class="progress-pct" id="progressPct">0%</div>
            </div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="empty-state d-none">
            <p>😕 No deals found. Try a different search term.</p>
        </div>

        <!-- Results -->
        <div id="resultsContainer" class="d-none">
            <div class="results-header">
                <h2><span id="dealCount">0</span> deals found</h2>
                <span id="dataSourceBadge" class="data-source-badge d-none"></span>
                <button id="exportBtn" class="btn-export">📥 Export CSV</button>
            </div>
            <div id="aiWarningContainer" class="alert alert-warning d-none"></div>
            <div id="dealsGrid" class="deals-grid"></div>
        </div>

    </main>

    <script src="/static/app.js"></script>
</body>
</html>
